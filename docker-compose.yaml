services:
  # mysql 설정
  comma-mysql:
    image: 'mysql:8.0'
    container_name: comma-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      TZ: Asia/Seoul
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - '127.0.0.1:3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - comma-network

  # Nginx
  comma-nginx:
    image: nginx:stable-alpine
    container_name: comma-nginx
    restart: always
    depends_on:
      - comma-app
    networks:
      - comma-network
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  comma-app:
    image: ${DOCKER_USERNAME}/comma-be:latest
    container_name: comma-be
    restart: always
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://comma-mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_REGION: ${AWS_REGION}
      # AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}

    depends_on:
      - comma-mysql
    networks:
      - comma-network

# 각 서비스들이 서로 통신할 수 있는 가상의 네트워크 정의
networks:
  comma-network:
    driver: bridge

# 데이터 보존을 위한 명명된 볼륨 정의
volumes:
  mysql_data:
