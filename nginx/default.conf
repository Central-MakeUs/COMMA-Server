upstream comma_app {
    server comma-app:8080;
}

# HTTP → HTTPS 리다이렉트 (+ 인증서 갱신용 ACME 챌린지 통로)
server {
    listen 80;
    server_name 167-126-10-48.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name 167-126-10-48.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/167-126-10-48.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/167-126-10-48.sslip.io/privkey.pem;

    # 업로드 사진 대비 (기본 1MB보다 넉넉히)
    client_max_body_size 12M;

    location / {
        proxy_pass http://comma_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}